services:
  - type: static_site
    name: prop-firm-api
    buildFilter:
      path: frontend/
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_BASE
        value: "/"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
