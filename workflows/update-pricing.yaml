name: Daily Prop Firm Pricing Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Node dependencies
        working-directory: ./scraper
        run: |
          npm ci
          npx playwright install --with-deps chromium
      
      - name: Install Python dependencies (for fallback)
        run: pip install requests
      
      - name: Run primary scraper
        working-directory: ./scraper
        id: scraper
        continue-on-error: true
        run: node index.js
        env:
          NODE_ENV: production
      
      - name: If scraper failed, use MCP fallback
        if: steps.scraper.outcome == 'failure'
        run: |
          npx -y propfirmdealfinder-mcp-server --stdio --tool pfdf_get_deals > data/raw_mcp_deals.json 2>/dev/null
          python scripts/mcp_to_plans.py
      
      - name: Export to plans.json
        working-directory: ./scraper
        run: node export.js
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config.user.email "actions@github.com"
          git add data/plans.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update prop firm pricing $(date +'%Y-%m-%d')" && git push)