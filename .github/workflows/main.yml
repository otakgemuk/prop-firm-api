name: Scrape Prop Firm Prices

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: ./scraper
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run scraper
        working-directory: ./scraper
        run: node index.js
      - name: Export to JSON
        working-directory: ./scraper
        run: node export.js
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/plans.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update pricing" && git push)
