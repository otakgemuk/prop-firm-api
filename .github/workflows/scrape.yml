# Manual scraper workflow — triggered via GitHub Actions UI
#
# Usage:
#   1. Go to Actions → Scrape Prop Firm Prices → Run workflow
#   2. (Optional) Enter firm slug to scrape one firm only
#   3. Workflow runs migrate → import → scrape → export
#   4. If prices changed, commits to main and triggers deploy

name: Scrape Prop Firm Prices

on:
  workflow_dispatch:
    inputs:
      firm:
        description: "Firm to scrape (e.g. topstep; leave empty for all)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools (for native modules like better-sqlite3)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            scraper/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm ci

      - name: Install Playwright browsers
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Migrate database schema
        working-directory: backend
        run: npm run migrate

      - name: Import baseline data from JSON
        working-directory: backend
        run: npm run import

      - name: Seed discount codes
        working-directory: backend
        run: node src/utils/seed-discounts.js

      - name: Run scraper
        working-directory: scraper
        run: |
          if [ -n "${{ inputs.firm }}" ]; then
            node index.js --firm "${{ inputs.firm }}"
          else
            node index.js
          fi

      - name: Export database to JSON
        working-directory: backend
        run: npm run export

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/plans.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No price changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Price changes detected:"
            git diff --stat data/plans.json
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Prop Firm Bot"
          git config user.email "bot@propfirmcompare.com"
          git add data/plans.json
          git commit -m "data: auto-update pricing from scraper

          Triggered manually on $(date -u +%Y-%m-%d\ %H:%M:%S) UTC"
          git push
