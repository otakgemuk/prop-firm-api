# Scheduled scraper — runs automatically every day at 06:00 UTC
#
# Checks all 10 firms for price changes and commits updates.
# If prices changed, the deploy workflow triggers automatically.

name: Scheduled Price Check

on:
  schedule:
    - cron: "0 6 * * *"   # Every day at 06:00 UTC
  workflow_dispatch:        # Also allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Install Playwright browsers
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        working-directory: scraper
        run: node index.js --apply

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/plans.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No price changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Price changes detected:"
            git diff --stat data/plans.json
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Prop Firm Bot"
          git config user.email "bot@propfirmcompare.com"
          git add data/plans.json
          git commit -m "data: auto-update pricing ($(date -u +%Y-%m-%d))

          Automated daily price check via GitHub Actions."
          git push
