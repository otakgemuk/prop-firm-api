# Scheduled scraper — runs automatically every day at 06:00 UTC
#
# Workflow:
#   1. Migrate: Create/update SQLite schema
#   2. Import: Load last-known-good data into DB
#   3. Scrape: Fetch fresh pricing data, upsert to DB
#   4. Export: Generate plans.json from DB
#   5. Commit: If prices changed, push to main
#
# If any parser fails, the job continues with fallback (old DB data).
# If 3+ parsers fail, the job fails to alert on stale data.

name: Scheduled Price Check

on:
  schedule:
    - cron: "0 6 * * *"   # Every day at 06:00 UTC
  workflow_dispatch:        # Also allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools (for native modules like better-sqlite3)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            scraper/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm ci

      - name: Install Playwright browsers
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Migrate database schema
        working-directory: backend
        run: npm run migrate

      - name: Import baseline data from JSON
        working-directory: backend
        run: npm run import

      - name: Seed discount codes
        working-directory: backend
        run: node src/utils/seed-discounts.js

      - name: Run scraper
        working-directory: scraper
        run: node index.js

      - name: Export database to JSON
        working-directory: backend
        run: npm run export

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/plans.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No price changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Price changes detected:"
            git diff --stat data/plans.json
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Prop Firm Bot"
          git config user.email "bot@propfirmcompare.com"
          git add data/plans.json
          git commit -m "data: auto-update pricing ($(date -u +%Y-%m-%d))

          Automated daily price check via GitHub Actions.
          Database migrated, baseline imported, 17 firms scraped, results exported."
          git push
